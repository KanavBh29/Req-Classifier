version: '3.8'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: reqtrace

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/reqtrace
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_min_32_chars}
      JWT_EXPIRE: 7d
      ML_SERVICE_URL: http://ml:8000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
      - ml

  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
